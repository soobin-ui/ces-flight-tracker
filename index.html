<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>CES 2027 항공권 가격 모니터링</title>
<style>
  :root{--bg:#fafafa;--card:#fff;--fg:#18181b;--muted:#71717a;--border:#e4e4e7;
        --primary:#4f46e5;--primary-bg:#eef2ff;--emerald:#059669;--emerald-bg:#ecfdf5;
        --red:#dc2626;--red-bg:#fef2f2;--amber:#f59e0b;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 16px}
  .hero{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .hero .icon{background:var(--primary-bg);border-radius:10px;padding:8px;font-size:18px}
  .hero .label{color:var(--primary);font-weight:600;font-size:13px}
  h1{font-size:26px;margin:4px 0 6px;font-weight:800}
  .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px}
  .banner{background:linear-gradient(90deg,#eef2ff, #fff 55%, #faf5ff);border-color:#c7d2fe;display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;align-items:center}
  .badge{display:inline-block;background:var(--primary);color:#fff;font-weight:700;font-size:12px;padding:3px 10px;border-radius:999px}
  .banner .meta{font-size:13px;color:var(--fg);margin-top:8px;line-height:1.9}
  .banner .meta .m{color:var(--muted)}
  .dday{background:#fff;border:1px solid #c7d2fe;border-radius:14px;padding:10px 22px;text-align:center;box-shadow:0 1px 4px rgba(79,70,229,.08)}
  .dday .n{font-size:30px;font-weight:900;color:var(--primary)}
  .dday .t{font-size:11px;color:var(--muted)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
  .stat .t{font-size:12px;color:var(--muted)} .stat .v{font-size:22px;font-weight:800;margin-top:2px}
  .best{border-color:#a7f3d0;background:linear-gradient(135deg,#ecfdf5,#fff 60%)}
  .best h3{margin:0 0 10px;font-size:17px} .best .trophy{color:var(--amber)}
  .best .row{display:flex;flex-wrap:wrap;gap:20px;align-items:baseline}
  .best .price{font-size:30px;font-weight:900;color:var(--emerald)}
  .best .desc{font-size:13px;color:var(--muted)}
  .tabs{display:flex;gap:6px;margin:20px 0 12px}
  .tab{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 18px;font-weight:600;font-size:14px;cursor:pointer}
  .tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  h2{font-size:17px;margin:18px 0 10px}
  table{border-collapse:collapse;width:100%;font-size:13px;background:var(--card)}
  th{background:#f4f4f5;font-weight:600;text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
  tr.cheapest{background:var(--emerald-bg)}
  tr.sep td{border-top:2px solid #d4d4d8}
  .w{font-weight:700}
  .pill{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:999px}
  .pill.up{color:var(--red);background:var(--red-bg)} .pill.down{color:var(--emerald);background:var(--emerald-bg)}
  .pill.flat,.pill.first{color:var(--muted);background:#f4f4f5}
  .stay{background:#f4f4f5;color:var(--fg);font-size:11.5px;padding:2px 8px;border-radius:999px}
  .verify{color:var(--primary);background:var(--primary-bg);font-size:12px;font-weight:600;padding:3px 10px;border-radius:8px;text-decoration:none}
  .tablebox{overflow-x:auto;border:1px solid var(--border);border-radius:14px}
  svg.chart{width:100%;height:auto;background:var(--card);border:1px solid var(--border);border-radius:14px}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--muted);margin:8px 2px}
  .legend .k{display:inline-flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  .caveat{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:12px 14px;border-radius:12px;font-size:13px;margin-top:18px}
  .foot{color:var(--muted);font-size:12.5px;margin:20px 0;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero"><span class="icon">✈️</span><span class="label">CES 2027 Flight Monitor</span></div>
  <h1>항공권 가격 모니터링</h1>
  <div class="sub">인천(ICN) → 라스베이거스(LAS)·로스앤젤레스(LAX), 대한항공(KE) 기준. CES 2027 항공권 가격을 매일 자동 추적합니다.</div>

  <div class="card banner">
    <div>
      <span class="badge">CES 2027</span>
      <div class="meta">
        📅 <b>본행사: 1/6(수) ~ 1/9(토)</b> <span class="m">· 미디어데이 1/4(월)~1/5(화)</span><br>
        📍 Las Vegas, NV <span class="m">· 시차: KST −17h (PST) · 매일 08:10 KST 수집</span>
      </div>
    </div>
    <div class="dday"><div class="t">CES 개막까지</div><div class="n" id="dday">-</div></div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="card best" id="best"></div>

  <div class="tabs" id="tabs"></div>
  <div id="routeView"></div>

  <div class="caveat" id="caveat"></div>
  <div class="foot" id="foot"></div>
</div>
<script>
const COLORS=["#4f46e5","#0891b2","#059669","#d97706","#dc2626","#7c3aed","#2563eb","#0d9488","#ca8a04","#e11d48","#6366f1","#06b6d4","#10b981","#f59e0b","#ef4444","#8b5cf6"];
const WD=["일","월","화","수","목","금","토"];
const won=n=>Math.round(n).toLocaleString('ko-KR')+'원';
const wd=s=>WD[new Date(s+'T00:00:00').getDay()];
const md=s=>{const p=s.split('-');return `${p[1]}.${p[2]} (${wd(s)})`};
const stay=(d,r)=>Math.round((new Date(r)-new Date(d))/86400000);

fetch('./data.json?_='+Date.now()).then(r=>r.json()).then(D=>{
  // D-Day
  const dd=Math.ceil((new Date('2027-01-06T00:00:00')-new Date())/86400000);
  document.getElementById('dday').textContent = dd>0?('D-'+dd):'진행중';

  const snaps=(D.snapshots||[]);
  const ces=snaps.filter(s=>s.dep.startsWith('2027-01'));
  const latest=D.observation_date;

  // 통계 카드
  const cum=D.cumulative||{};
  const combos=new Set(ces.map(s=>s.route+s.dep+s.ret)).size;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="t">수집 일수</div><div class="v">${cum.days_collected||0}일</div></div>`+
    `<div class="stat"><div class="t">총 스냅샷</div><div class="v">${cum.total_snapshots||0}건</div></div>`+
    `<div class="stat"><div class="t">CES 날짜 조합</div><div class="v">${combos}개</div></div>`+
    `<div class="stat"><div class="t">최초 관측일</div><div class="v" style="font-size:17px">${cum.first_observation_date||'-'}</div></div>`;

  // 최적 구매 추천 (오늘, CES 조합 기준, 노선별)
  const bestEl=document.getElementById('best');
  let bestHtml='<h3><span class="trophy">🏆</span> 최적 구매 시점 추천 <span class="desc">('+ (latest||'-') +' 기준, CES 기간 조합)</span></h3>';
  ['ICN-LAS','ICN-LAX'].forEach(route=>{
    const today=ces.filter(s=>s.obs===latest&&s.route===route&&s.price>0);
    if(!today.length) return;
    const ch=today.reduce((a,b)=>a.price<b.price?a:b), ex=today.reduce((a,b)=>a.price>b.price?a:b);
    bestHtml+=`<div class="row" style="margin-top:6px"><b style="min-width:80px">${route}</b>
      <span class="price">${won(ch.price)}</span>
      <span class="desc">${md(ch.dep)} 출발 → ${md(ch.ret)} 귀국 · ${stay(ch.dep,ch.ret)}박 · ${ch.stops===0?'직항':'경유 '+ch.stops+'회'}
      · 최고가 조합 대비 <b style="color:var(--emerald)">${won(ex.price-ch.price)} 절약</b></span></div>`;
  });
  bestEl.innerHTML=bestHtml;

  // 노선 탭
  const routes=['ICN-LAS','ICN-LAX'];
  const tabsEl=document.getElementById('tabs');
  routes.forEach((r,i)=>{
    tabsEl.insertAdjacentHTML('beforeend',`<button class="tab${i===0?' active':''}" data-r="${r}">${r}${r==='ICN-LAX'?' (직항 벤치마크)':' (CES 실동선)'}</button>`);
  });
  tabsEl.addEventListener('click',e=>{
    const b=e.target.closest('.tab'); if(!b) return;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    b.classList.add('active'); render(b.dataset.r);
  });

  function chartSVG(route){
    const curves=(D.curves||[]).filter(c=>c.route===route&&c.departure_date.startsWith('2027-01'));
    const all=curves.flatMap(c=>c.points);
    if(!all.length) return '<div class="desc" style="color:var(--muted);font-size:13px;padding:14px">차트는 데이터가 쌓이면 표시됩니다.</div>';
    const obsDates=[...new Set(all.map(p=>p.observation_date))].sort();
    const ys=all.map(p=>p.price); const ymin=Math.min(...ys),ymax=Math.max(...ys);
    const W=1000,H=320,padL=64,padR=16,padT=16,padB=34;
    const sx=i=>padL+(obsDates.length===1?0.5:(i/(obsDates.length-1)))*(W-padL-padR);
    const sy=v=>H-padB-(ymax===ymin?0.5:(v-ymin)/(ymax-ymin))*(H-padT-padB);
    let g='';
    // gridlines + y labels
    for(let k=0;k<=4;k++){const v=ymin+(ymax-ymin)*k/4, y=sy(v);
      g+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#e4e4e7" stroke-dasharray="3 3"/>`;
      g+=`<text x="${padL-8}" y="${y+4}" text-anchor="end" font-size="11" fill="#71717a">${Math.round(v/10000)}만</text>`;}
    obsDates.forEach((d,i)=>{g+=`<text x="${sx(i)}" y="${H-10}" text-anchor="middle" font-size="11" fill="#71717a">${d.slice(5)}</text>`;});
    let legend='';
    curves.forEach((c,ci)=>{
      const col=COLORS[ci%COLORS.length];
      const pts=c.points.slice().sort((a,b)=>a.observation_date.localeCompare(b.observation_date));
      const dpath=pts.map((p,i)=>(i?'L':'M')+sx(obsDates.indexOf(p.observation_date)).toFixed(1)+' '+sy(p.price).toFixed(1)).join(' ');
      g+=`<path d="${dpath}" fill="none" stroke="${col}" stroke-width="2"/>`;
      pts.forEach(p=>{g+=`<circle cx="${sx(obsDates.indexOf(p.observation_date)).toFixed(1)}" cy="${sy(p.price).toFixed(1)}" r="3.4" fill="${col}"/>`;});
      legend+=`<span class="k"><span class="dot" style="background:${col}"></span>${md(c.departure_date)}→${md(c.return_date)}</span>`;
    });
    return `<svg class="chart" viewBox="0 0 ${W} ${H}">${g}</svg><div class="legend">${legend}</div>`;
  }

  function tableHTML(route){
    const rows=ces.filter(s=>s.route===route).sort((a,b)=> b.obs.localeCompare(a.obs)||a.dep.localeCompare(b.dep)||a.ret.localeCompare(b.ret));
    if(!rows.length) return '<div style="padding:14px;color:var(--muted);font-size:13px">데이터가 수집되면 여기에 표시됩니다</div>';
    const cheapToday=Math.min(...rows.filter(r=>r.obs===latest&&r.price>0).map(r=>r.price));
    let last=''; let h=`<div class="tablebox"><table><tr><th>수집일</th><th>출발</th><th>귀국</th><th>체류</th><th style="text-align:right">최저가(KE)</th><th style="text-align:right">전일 대비</th><th>경유</th><th>검증</th></tr>`;
    rows.forEach(r=>{
      const prev=snaps.find(p=>p.route===r.route&&p.dep===r.dep&&p.ret===r.ret&&p.obs<r.obs);
      const chg=prev?r.price-prev.price:null;
      const sep=r.obs!==last?' sep':''; const isNew=r.obs!==last; last=r.obs;
      const isCheap=r.obs===latest&&r.price===cheapToday;
      h+=`<tr class="${isCheap?'cheapest':''}${sep}">
        <td>${r.obs}${isNew?` <span class="stay">${wd(r.obs)}</span>`:''}</td>
        <td class="w">${md(r.dep)}</td><td class="w">${md(r.ret)}</td>
        <td><span class="stay">${stay(r.dep,r.ret)}박</span></td>
        <td style="text-align:right" class="w">${isCheap?'🏆 ':''}<span style="${isCheap?'color:var(--emerald)':''}">${won(r.price)}</span></td>
        <td style="text-align:right">${chg===null?'<span class="pill first">첫 수집</span>':chg>0?`<span class="pill up">▲ +${won(chg)}</span>`:chg<0?`<span class="pill down">▼ ${won(chg)}</span>`:'<span class="pill flat">변동 없음</span>'}</td>
        <td>${r.stops===0?'직항':r.stops==null?'-':'경유 '+r.stops}</td>
        <td><a class="verify" href="${r.verify_url}" target="_blank" rel="noopener">↗ 확인</a></td></tr>`;
    });
    return h+'</table></div>';
  }

  function anchorsHTML(){
    const anchors=snaps.filter(s=>!s.dep.startsWith('2027-01')&&s.obs===latest);
    if(!anchors.length) return '';
    let h='<h2>리드타임 앵커 (참고용 — 30/60/120일 전 구매가 관측)</h2><div class="tablebox"><table><tr><th>노선</th><th>출발</th><th>귀국</th><th>D-n</th><th style="text-align:right">최저가(KE)</th><th>검증</th></tr>';
    anchors.sort((a,b)=>a.route.localeCompare(b.route)||a.dtd-b.dtd).forEach(r=>{
      h+=`<tr><td class="w">${r.route}</td><td>${md(r.dep)}</td><td>${md(r.ret)}</td><td><span class="stay">D-${r.dtd}</span></td>
        <td style="text-align:right" class="w">${won(r.price)}</td><td><a class="verify" href="${r.verify_url}" target="_blank" rel="noopener">↗ 확인</a></td></tr>`;
    });
    return h+'</table></div>';
  }

  function render(route){
    document.getElementById('routeView').innerHTML=
      `<h2>가격 추이 (수집일별, CES 날짜 조합)</h2>`+chartSVG(route)+
      `<h2>가격 비교 테이블</h2>`+tableHTML(route)+anchorsHTML();
  }
  render('ICN-LAS');

  document.getElementById('caveat').textContent='⚠️ '+(D.caveat||'')+' 가격은 구글플라이트 표시 기준 대한항공(KE) 포함 여정 최저가입니다.';
  document.getElementById('foot').textContent=`ICN⇄LAS(경유 포함)·ICN⇄LAX(직항) · 매일 08:10 KST 자동 수집 · 갱신 ${D.generated_at||''}`;
});
</script>
</body>
</html>
